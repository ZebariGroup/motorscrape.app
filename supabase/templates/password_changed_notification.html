<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your password was changed</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f4f5;
      font-family:
        -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #52525b;
    "
  >
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #f4f4f5; padding: 32px 16px">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" style="max-width: 560px; background: #ffffff; border: 1px solid #e4e4e7; border-radius: 12px; overflow: hidden" cellspacing="0" cellpadding="0">
            <tr>
              <td style="padding: 28px 28px 8px 28px; border-bottom: 1px solid #f4f4f5">
                <p style="margin: 0; font-size: 18px; font-weight: 600; color: #18181b">Motorscrape</p>
                <p style="margin: 6px 0 0 0; font-size: 13px; color: #71717a">We crawl so you can drive.</p>
              </td>
            </tr>
            <tr>
              <td style="padding: 28px">
                <h1 style="margin: 0 0 12px 0; font-size: 20px; font-weight: 600; color: #18181b">Password updated</h1>
                <p style="margin: 0 0 16px 0; font-size: 15px; line-height: 1.55; color: #52525b">
                  This is a confirmation that the password for <strong style="color: #18181b">{{ .Email }}</strong> was just changed.
                </p>
                <p style="margin: 0; font-size: 13px; line-height: 1.5; color: #a1a1aa">
                  If you did not make this change, reset your password and contact support immediately.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 16px 28px 24px 28px; background: #fafafa; border-top: 1px solid #f4f4f5">
                <p style="margin: 0; font-size: 12px; color: #a1a1aa">
                  <a href="{{ .SiteURL }}" style="color: #047857; text-decoration: none">Motorscrape</a>
                  · Local dealership inventory, one place.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
